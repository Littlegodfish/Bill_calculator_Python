{% extends "base.html" %}

{% block head %}
    <title>Edit Task</title>
{% endblock %}

{% block body %}
    <div class ="content">
        <h1>Edit Task</h1>
        <form action="/edit/{{task.id}}" method="POST">
            <input type="text" name ="content" id="content" value="{{task.content}}">
            <input type="number" name ="amount" id="amount" value="{{task.amount}}" step="0.01">
            <input type="submit" value="Update Task" id="btn_add">
        </form>
    </div>
{% endblock %}
