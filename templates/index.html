{% extends "base.html" %}

{% block head %}
    <div class="header">
        <h1>Split Bill Calculator</h1>
    </div>
{% endblock %}

{% block body %}
    
    <div class ="content">
        <div class="form-title">
            <div class="form-name">
                <input type="text" id="header-input" placeholder="Expense Title #1">
                <p>E.g. McDonald's 3/14/2026</p>
            </div>
            <input type="submit" id="add_receipt_btn" value="Add Receipt">
        </div>
        <div class="form-list-input">
            <div class="list-header">
                <h1>Name</h1>
                <h1>Cost</h1>
            </div>
            <div class="list-input" id="list-input-row-0">
                <span class="row-count">1</span>
                <div class="row-fields">
                    <input type="text" class="name-input">
                    <input type="number" class="cost-input" min="0">
                </div>
                <button type="button" class="delete-row" aria-label="Delete row">✕</button>
            </div>
            <div class="list-input" id="list-input-row-1">
                <span class="row-count">2</span>
                <div class="row-fields">
                    <input type="text" class="name-input">
                    <input type="number" class="cost-input" min="0">
                </div>
                <button type="button" class="delete-row" aria-label="Delete row">✕</button>
            </div>
            <button type="button" id="add-person-row"> Add Person</button>
        </div>

        <div class="summary-input">
            <div class="summary-row">
                <h1>Subtotal</h1>
                <input type="number" id="subtotal-input" class="summary-input-field" min="0">
            </div>
            <div class="summary-row">
                <h1>Tax</h1>
                <input type="number" id="tax-input" class="summary-input-field" min="0">
            </div>
            <div class="summary-row">
                <h1>Tip</h1>
                <div class="tip-row-container">
                    <input type="number" id="tip-input" class="summary-input-field" min="0">
                    <div class="tip-checkbox-wrapper">
                        <label for="split-tip-checkbox" class="split-tip-label">split tip evenly?</label>
                        <input type="checkbox" id="split-tip-checkbox" class="split-tip-checkbox">
                    </div>
                </div>
            </div>
            <div class="calculate-button-row">
                <button type="button" id="calculate-btn">Calculate</button>
            </div>
        </div>
        
        <div class="form-list-output" id="form-list-output" style="display:none;">
            <div class="list-header">
                <h1>Name</h1>
                <h1>Amount</h1>
            </div>
            <div class="list-output-rows" id="list-output-rows">
                <!-- Output rows are generated after Calculate is clicked -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const listInputContainer = document.querySelector('.form-list-input');
            const addRowBtn = document.getElementById('add-person-row');
            let rowCounter = 3; // next row after default 1 and 2

            // Delegated listener for existing and future delete buttons
            listInputContainer.addEventListener('click', function (event) {
                if (event.target.classList.contains('delete-row')) {
                    const toDelete = event.target.closest('.list-input');
                    if (toDelete) {
                        toDelete.remove();
                        // Reindex after delete
                        const rows = listInputContainer.querySelectorAll('.list-input');
                        let index = 1;
                        rows.forEach(row => {
                            const countSpan = row.querySelector('.row-count');
                            if (countSpan) {
                                countSpan.textContent = index++;
                            }
                        });
                        rowCounter = index;
                    }
                }
            });

            addRowBtn.addEventListener('click', function () {
                const row = document.createElement('div');
                row.className = 'list-input';
                row.id = `list-input-row-${rowCounter}`;

                const countLabel = document.createElement('span');
                countLabel.className = 'row-count';
                countLabel.textContent = rowCounter;

                const nameInput = document.createElement('input');
                nameInput.type = 'text';
                nameInput.className = 'name-input';

                const costInput = document.createElement('input');
                costInput.type = 'number';
                costInput.className = 'cost-input';
                costInput.inputMode = 'decimal';

                row.appendChild(countLabel);

                const fields = document.createElement('div');
                fields.className = 'row-fields';
                fields.appendChild(nameInput);
                fields.appendChild(costInput);

                const deleteBtn = document.createElement('button');
                deleteBtn.type = 'button';
                deleteBtn.className = 'delete-row';
                deleteBtn.textContent = '✕';
                deleteBtn.setAttribute('aria-label', 'Delete row');
                deleteBtn.addEventListener('click', function () {
                    row.remove();
                });

                row.appendChild(fields);
                row.appendChild(deleteBtn);

                // Insert row above the button, keep the button bottom-most
                listInputContainer.insertBefore(row, addRowBtn);

                rowCounter += 1;
            });

            const calculateBtn = document.getElementById('calculate-btn');
            const formListOutput = document.getElementById('form-list-output');
            const listOutputRows = document.getElementById('list-output-rows');
            const subtotalInput = document.getElementById('subtotal-input');
            const taxInput = document.getElementById('tax-input');
            const tipInput = document.getElementById('tip-input');
            const splitTipCheckbox = document.getElementById('split-tip-checkbox');

            function createOutputRow(index, name, amount) {
                const row = document.createElement('div');
                row.className = 'list-output';
                row.id = `list-output-row-${index}`;

                const countLabel = document.createElement('span');
                countLabel.className = 'row-count';
                countLabel.textContent = index;

                const fields = document.createElement('div');
                fields.className = 'row-fields';

                const nameInput = document.createElement('input');
                nameInput.type = 'text';
                nameInput.className = 'name-input';
                nameInput.value = name;
                nameInput.readOnly = true;

                const costInput = document.createElement('input');
                costInput.type = 'number';
                costInput.className = 'cost-input';
                costInput.min = '0';
                costInput.value = amount.toFixed(2);
                costInput.readOnly = true;

                fields.appendChild(nameInput);
                fields.appendChild(costInput);
                row.appendChild(countLabel);
                row.appendChild(fields);
                return row;
            }

            function updateOutputRows() {
                const inputRows = listInputContainer.querySelectorAll('.list-input');
                const people = [];
                const costs = [];

                inputRows.forEach(row => {
                    const nameInput = row.querySelector('.name-input');
                    const costInput = row.querySelector('.cost-input');
                    const name = nameInput ? nameInput.value.trim() : '';
                    const cost = costInput ? Number(costInput.value) || 0 : 0;
                    people.push(name);
                    costs.push(cost);
                });

                const subtotal = Number(subtotalInput.value) || 0;
                const tax = Number(taxInput.value) || 0;
                const tip = Number(tipInput.value) || 0;
                const taxPercentage = subtotal > 0 ? tax / subtotal : 0;
                const tipPercentage = subtotal > 0 ? tip / subtotal : 0;
                const splitTip = splitTipCheckbox.checked;
                const peopleCount = people.length;
                const evenTip = peopleCount > 0 ? tip / peopleCount : 0;

                listOutputRows.innerHTML = '';
                people.forEach((name, idx) => {
                    let amount = costs[idx] + costs[idx] * taxPercentage;
                    amount += splitTip ? evenTip : costs[idx] * tipPercentage;
                    listOutputRows.appendChild(createOutputRow(idx + 1, name, amount));
                });
            }

            calculateBtn.addEventListener('click', function () {
                const inputRows = listInputContainer.querySelectorAll('.list-input');
                if (inputRows.length === 0) {
                    formListOutput.style.display = 'none';
                    return;
                }

                updateOutputRows();
                formListOutput.style.display = 'block';
            });
        });
    </script>
{% endblock %}
