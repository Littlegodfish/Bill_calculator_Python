{% extends "base.html" %}

{% block head %}
    <div class="page-header">
        <h1>Split Bill Calculator</h1>
    </div>
{% endblock %}

{% block body %}
    
    <div class ="content">
        <div class="form-title">
            <div class="form-name">
                <input type="text" class="header-input" placeholder="Expense Title #1">
                <p class="form-hint">E.g. KFC 3/21/2025</p>
            </div>
            <button class="btn-primary">Add Receipt</button>
        </div>

        <div class="form-list-input">
            
            <div class="list-header">
                <h1>Name</h1>
                <h1>Cost</h1>
            </div>

            <div class="list-input" id="list-input-row-0">
                <span class="row-count">1</span>
                <input type="text" class="name-input">
                <input type="number" class="cost-input" min="0">
                <button type="button" class="delete-row" aria-label="Delete row">✕</button>
            </div>

            <div class="list-input" id="list-input-row-1">
                <span class="row-count">2</span>
                <input type="text" class="name-input">
                <input type="number" class="cost-input" min="0">
                <button type="button" class="delete-row" aria-label="Delete row">✕</button>
            </div>

            <button type="button" id="add-person-row"> Add Person</button>
        </div>

        <div class="summary-form">

            <div class="summary-row">
                <label class="summary-label">Subtotal</label>
                <input type="number" id="subtotal-input" class="summary-input" min="0">
            </div>

            <div class="summary-row">
                <label class="summary-label">Tax</label>
                <input type="number" id="tax-input" class="summary-input" min="0">
            </div>

            <div class="summary-row">
                <label class="summary-label">Tip</label>

                <div class="tip-row-container">
                    <input type="number" id="tip-input" class="summary-input" min="0">

                    <label for="split-tip-checkbox" class="tip-checkbox-wrapper">
                        <span class="split-tip-label">Split tip<br>evenly?</span>
                        <input type="checkbox" id="split-tip-checkbox" class="split-tip-checkbox">
                    </label>
                </div>
            </div>

            <div class="calculate-button-row">
                <button type="button" id="calculate-btn">Calculate</button>
            </div>
        </div>
        
        
        <div class="form-list-output is-hidden" id="form-list-output">
            <div class="list-header">
                <h1>Name</h1>
                <h1>Amount</h1>
            </div>

            <div class="list-output-rows" id="list-output-rows"></div>

            <div class="list-output grand-total-row" id="grand-total-row">
                <span class="row-count"></span>
                <div class="row-fields">
                    <span class="grand-total-label">Grand Total</span>
                    <input type="number" class="cost-input" id="grand-total-value" min="0" readonly>
                </div>
            </div>
        </div>
    </div>




    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const elements = {
                headerInput: document.querySelector(".header-input"),
                formHint: document.querySelector(".form-hint"),
                listInputContainer: document.querySelector(".form-list-input"),
                addRowBtn: document.getElementById("add-person-row"),
                calculateBtn: document.getElementById("calculate-btn"),
                formListOutput: document.getElementById("form-list-output"),
                listOutputRows: document.getElementById("list-output-rows"),
                grandTotalValue: document.getElementById("grand-total-value"),
                subtotalInput: document.getElementById("subtotal-input"),
                taxInput: document.getElementById("tax-input"),
                tipInput: document.getElementById("tip-input"),
                splitTipCheckbox: document.getElementById("split-tip-checkbox")
            };

            let rowCounter = 3;

            function toggleHint() {
                elements.formHint.style.display =
                    elements.headerInput.value.length > 0 ? "none" : "";
            }

            function reindexRows() {
                const rows = elements.listInputContainer.querySelectorAll(".list-input");
                rows.forEach((row, index) => {
                    const countSpan = row.querySelector(".row-count");
                    if (countSpan) {
                        countSpan.textContent = index + 1;
                    }
                });
                rowCounter = rows.length + 1;
            }

            function createInputRow(index) {
                const row = document.createElement("div");
                row.className = "list-input";
                row.id = `list-input-row-${index}`;

                row.innerHTML = `
                    <span class="row-count">${index}</span>
                    <input type="text" class="name-input">
                    <input type="number" class="cost-input" inputmode="decimal">
                    <button type="button" class="delete-row" aria-label="Delete row">✕</button>
                `;

                return row;
            }

            function createOutputRow(index, name, amount) {
                const row = document.createElement("div");
                row.className = "list-output";
                row.id = `list-output-row-${index}`;

                row.innerHTML = `
                    <span class="row-count">${index}</span>
                    <div class="row-fields">
                        <input type="text" class="name-input" value="${name}" readonly>
                        <input type="number" class="cost-input" value="${amount.toFixed(2)}" readonly>
                    </div>
                `;

                return row;
            }

            function getInputData() {
                const rows = elements.listInputContainer.querySelectorAll(".list-input");
                const people = [];
                const costs = [];

                rows.forEach(row => {
                    const name = row.querySelector(".name-input")?.value.trim() || "";
                    const cost = Number(row.querySelector(".cost-input")?.value) || 0;
                    people.push(name);
                    costs.push(cost);
                });

                return { people, costs };
            }

            function updateOutputRows(breakdown, people) {
                elements.listOutputRows.innerHTML = "";
                let grandTotal = 0;

                people.forEach((name, index) => {
                    const amount = breakdown[name] || 0;
                    grandTotal += amount;
                    elements.listOutputRows.appendChild(
                        createOutputRow(index + 1, name, amount)
                    );
                });

                elements.grandTotalValue.value = grandTotal.toFixed(2);
                elements.formListOutput.classList.remove("is-hidden");
            }

            async function handleCalculate() {
                const { people, costs } = getInputData();

                if (people.length === 0) {
                    elements.formListOutput.classList.add("is-hidden");
                    return;
                }

                const payload = {
                    people,
                    costs,
                    subtotal: Number(elements.subtotalInput.value) || 0,
                    tax: Number(elements.taxInput.value) || 0,
                    tip: Number(elements.tipInput.value) || 0,
                    evenly_split_tip: elements.splitTipCheckbox.checked
                };

                try {
                    const response = await fetch("/calculate", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    const breakdown = await response.json();
                    updateOutputRows(breakdown, people);
                } catch (error) {
                    console.error("Calculation error:", error);
                }
            }

            elements.headerInput.addEventListener("input", toggleHint);

            elements.listInputContainer.addEventListener("click", event => {
                if (event.target.classList.contains("delete-row")) {
                    const row = event.target.closest(".list-input");
                    if (row) {
                        row.remove();
                        reindexRows();
                    }
                }
            });

            elements.addRowBtn.addEventListener("click", () => {
                const row = createInputRow(rowCounter);
                elements.listInputContainer.insertBefore(row, elements.addRowBtn);
                reindexRows();
            });

            elements.calculateBtn.addEventListener("click", handleCalculate);
        });
    </script>
{% endblock %}
